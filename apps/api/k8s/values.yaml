replicaCount: 1

image:
  repository: ''
  pullPolicy: IfNotPresent
  tag: ''

nameOverride: ''
fullnameOverride: ''

podAnnotations: {}
podLabels: {}

service:
  port: 8080

health:
  enabled: true

gateway:
  name: gateway
  sectionName: api

route:
  hostname: api.boots.effervescentia.com

web:
  origin: https://app.boots.effervescentia.com:1337

postgres:
  hostname: db-postgres
  port: 5432
  database: boots
  username: boots

redis:
  hostname: db-redis-master
  port: 6379
  username: default

account:
  alias:
    max: 3
    expiry:
      short: 1d
      long: 1mo
