replicaCount: 1

image:
  repository: ''
  pullPolicy: IfNotPresent
  tag: ''

nameOverride: ''
fullnameOverride: ''

podAnnotations: {}
podLabels: {}

service:
  port: 8080

health:
  enabled: true

gateway:
  name: gateway
  sectionName: api

route:
  hostname: api.boots.effervescentia.com

web:
  origin: https://app.boots.effervescentia.com:1337

android:
  fingerprint: B5:43:1F:3D:77:C6:9F:4B:75:5D:74:3E:B1:43:B6:4D:B9:6E:C8:FB:A7:8F:A1:25:9B:34:F1:2D:0C:02:EC:1F

postgres:
  hostname: db-postgres
  port: 5432
  database: boots
  username: boots

redis:
  hostname: db-redis-master
  port: 6379
  username: default

account:
  alias:
    max: 3
    expiry:
      short: 1d
      long: 1mo

cron:
  directory: build
  extension: js
  args: ''
