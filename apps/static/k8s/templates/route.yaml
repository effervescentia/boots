apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "boots-static.fullname" . }}
  labels:
    {{- include "boots-static.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      # sectionName: {{ .Values.gateway.sectionName }}
  hostnames:
    {{- with .Values.route.hostnames }}
    {{- toYaml . | nindent 2 }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "boots-static.fullname" . }}
          port: {{ .Values.service.port }}
