apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "boots-web.fullname" . }}
  labels:
    {{- include "boots-web.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.service.port | quote }}
  PORT_HEALTH: {{ .Values.health.port | quote }}
  
  VEX_API_HOST: {{ .Values.api.host }}

  VEX_GEOLOCATION_TTL: {{ .Values.geolocation.ttl | quote }}
