apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: gateway
  namespace: boots
  annotations:
    cert-manager.io/cluster-issuer: boots-cluster-issuer
spec:
  gatewayClassName: traefik
  listeners:
    - name: api
      port: 8443
      protocol: HTTPS
      hostname: api.boots.effervescentia.com
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - name: api-tls
    - name: api-http
      port: 8000
      protocol: HTTP
      hostname: api.boots.effervescentia.com
      allowedRoutes:
        namespaces:
          from: Same
    - name: web
      port: 8443
      protocol: HTTPS
      hostname: app.boots.effervescentia.com
      allowedRoutes:
        namespaces:
          from: Same
      tls:
        mode: Terminate
        certificateRefs:
          - name: web-tls
    - name: web-http
      port: 8000
      protocol: HTTP
      hostname: app.boots.effervescentia.com
      allowedRoutes:
        namespaces:
          from: Same
